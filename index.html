<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/mcired.png" />
    <title>MCI Training Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              mci: {
                navy: '#0F2A44',
                teal: '#1F8A8A',
                amber: '#F5A623',
                maroon: '#6B0F1A',
                lightGrey: '#F4F6F8',
                borderGrey: '#E5E7EB',
                text: '#111111',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
            }
          }
        }
      }
    </script>
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: #111111;
      }
      
      /* Link Hover Animation: Left-to-Right Underline Growth */
      .animated-link {
        position: relative;
        text-decoration: none;
        display: inline-block;
      }
      
      .animated-link::after {
        content: '';
        position: absolute;
        width: 100%;
        transform: scaleX(0);
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: #1F8A8A; /* MCI Teal */
        transform-origin: bottom right;
        transition: transform 0.25s ease-out;
      }
      
      .animated-link:hover::after {
        transform: scaleX(1);
        transform-origin: bottom left;
      }
    </style>
